<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Carta do Leitor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eaeaea;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 800px;
            margin: 50px auto;
            background-color: #f5f5f5;
            padding: 60px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            font-size: 42px;
            margin-bottom: 50px;
        }
        .data-local {
            font-size: 18px;
            margin-bottom: 30px;
        }
        .conteudo {
            text-align: justify;
            text-indent: 50px; /* recuo do parágrafo */
            font-size: 20px;
            line-height: 1.6;
            margin-bottom: 60px;
        }
        .assinatura {
            text-align: right;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Das escencias humanas</h1>
        <div class="data-local">
            Santa Catarina, 14 de Abril de 2026
        </div>
        <div class="conteudo">
            "A vida é como andar em bicicleta. Manter o equilibrio requer manter o movimento"
        </div>
        <div class="assinatura">
            Att,<br>
            Albert Einstein
        </div>
    </div>
</body>
</html>
